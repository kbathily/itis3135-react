<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles/default.css">
    <link rel="stylesheet" href="styles/card.css">
    <title>K Bathily's Brave Kudu ~ ITIS 3135 | Page of Cards</title>
</head>
<body>
    <div data-include="components/header.html"></div>
    <main>
        <h2>Page of Playing Cards</h2>
        <p>Below is a sample five-card hand built with HTML and CSS.</p>

        <section class="cards-stage" aria-label="Sample playing card hand">
            <article class="playing-card heart" aria-label="Ace of Hearts">
                <span class="corner corner-top">A<br>&hearts;</span>
                <span class="pip">&hearts;</span>
                <span class="corner corner-bottom">A<br>&hearts;</span>
            </article>

            <article class="playing-card spade" aria-label="King of Spades">
                <span class="corner corner-top">K<br>&spades;</span>
                <span class="pip">&spades;</span>
                <span class="corner corner-bottom">K<br>&spades;</span>
            </article>

            <article class="playing-card diamond" aria-label="Ten of Diamonds">
                <span class="corner corner-top">10<br>&diams;</span>
                <span class="pip">&diams;</span>
                <span class="corner corner-bottom">10<br>&diams;</span>
            </article>

            <article class="playing-card club" aria-label="Seven of Clubs">
                <span class="corner corner-top">7<br>&clubs;</span>
                <span class="pip">&clubs;</span>
                <span class="corner corner-bottom">7<br>&clubs;</span>
            </article>

            <article class="playing-card heart" aria-label="Queen of Hearts">
                <span class="corner corner-top">Q<br>&hearts;</span>
                <span class="pip">&hearts;</span>
                <span class="corner corner-bottom">Q<br>&hearts;</span>
            </article>
        </section>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="Scripts/htmlinclude.js"></script>
</body>
</html>
