<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>

<title>Book Inventory</title>

<style>
/* ---------- Table Layout ---------- */
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

table {
  border-collapse: collapse;
  width: 90%;
  margin: 20px auto;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

h1 {
  text-align: center;
}

/* ---------- Row Backgrounds using Attribute Selectors ---------- */
tr[class="read"] {
  background-image: linear-gradient(to right, #d4edda, #f0fff4);
}

tr[class="to-read"] {
  background-image: linear-gradient(to right, #fff3cd, #fffdf0);
}

tr[class="in-progress"] {
  background-image: linear-gradient(to right, #d1ecf1, #f0fbff);
}

/* ---------- Span Display ---------- */
span {
  display: inline-block;
}

/* ---------- Status Styling ---------- */
tr[class="to-read"] span[class="status"] {
  border: 1px solid #e0a800;
  background-image: linear-gradient(to right, #ffeeba, #fff8dc);
  padding: 3px 8px;
}

tr[class="read"] span[class="status"] {
  border: 1px solid #28a745;
  background-image: linear-gradient(to right, #c3e6cb, #eaffea);
  padding: 3px 8px;
}

tr[class="in-progress"] span[class="status"] {
  border: 1px solid #17a2b8;
  background-image: linear-gradient(to right, #bee5eb, #e6faff);
  padding: 3px 8px;
}

/* ---------- Status + Rate Size ---------- */
span[class="status"],
span[class^="rate"] {
  height: 20px;
  width: auto;
}

/* ---------- Stars (Rate System) ---------- */
span[class^="rate"] > span {
  border-radius: 3px;
  margin: 2px;
  height: 12px;
  width: 12px;
  background-color: #eee;
}

/* ---------- Rating Fill ---------- */
/* one → first descendant only */
span[class~="one"] > span:first-child {
  background-image: linear-gradient(to right, gold, orange);
}

/* two → first TWO descendants */
span[class~="two"] > span:nth-child(1),
span[class~="two"] > span:nth-child(2) {
  background-image: linear-gradient(to right, gold, orange);
}

/* three → ALL three descendants */
span[class~="three"] > span {
  background-image: linear-gradient(to right, gold, orange);
}


</style>
</head>

<body>
    <div data-include="components/header.html"></div>

<h1>Book Inventory</h1>

<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Category</th>
      <th>Status</th>
      <th>Rate</th>
    </tr>
  </thead>

  <tbody>
    <tr class="read">
      <td>The Great Gatsby</td>
      <td>F. Scott Fitzgerald</td>
      <td>Classic</td>
      <td><span class="status">Read</span></td>
      <td>
        <span class="rate three">
          <span></span><span></span><span></span>
        </span>
      </td>
    </tr>

    <tr class="to-read">
      <td>Atomic Habits</td>
      <td>James Clear</td>
      <td>Self-help</td>
      <td><span class="status">To Read</span></td>
      <td>
        <span class="rate">
          <span></span><span></span><span></span>
        </span>
      </td>
    </tr>

    <tr class="in-progress">
      <td>Clean Code</td>
      <td>Robert C. Martin</td>
      <td>Programming</td>
      <td><span class="status">In Progress</span></td>
      <td>
        <span class="rate">
          <span></span><span></span><span></span>
        </span>
      </td>
    </tr>

    <tr class="read">
      <td>1984</td>
      <td>George Orwell</td>
      <td>Dystopian</td>
      <td><span class="status">Read</span></td>
      <td>
        <span class="rate two">
          <span></span><span></span><span></span>
        </span>
      </td>
    </tr>
  </tbody>
</table>
    <div data-include="components/footer.html"></div>
    <script src="Scripts/htmlinclude.js"></script>

</body>
</html>
