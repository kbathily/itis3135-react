<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <title>SmartFit Tracker</title>
  <link rel="stylesheet" href="styles/product.css" />
</head>

<body>
    <div data-include="components/header.html"></div>
  <!-- Header -->
  <header id="header">
    <img
      id="header-img"
      src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png"
      alt="SmartFit Logo"
    >

    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#video-section">Demo</a>
      <a class="nav-link" href="#pricing">Pricing</a>
    </nav>
  </header>

  <main>

  <!-- Features Section -->
  <section id="features">
    <h2>Powerful Fitness Tracking</h2>
    <p>Track your health, monitor workouts, and stay motivated with SmartFit Tracker.</p>
  </section>

  <!-- Video Section -->
  <section id="video-section">
    <h2>Watch SmartFit in Action</h2>
    <iframe
      id="video"
      width="560"
      height="315"
      src="https://www.youtube.com/embed/UB1O30fR-EE"
      title="SmartFit Product Demo"
      allowfullscreen>
    </iframe>
  </section>

  <!-- Pricing Section -->
  <section id="pricing">
    <h2>Simple Pricing</h2>
    <div class="pricing-container">
      <div class="plan">
        <h3>Basic</h3>
        <p>$9/month</p>
      </div>

      <div class="plan">
        <h3>Pro</h3>
        <p>$19/month</p>
      </div>

      <div class="plan">
        <h3>Elite</h3>
        <p>$29/month</p>
      </div>
    </div>
  </section>

  <!-- Email Form -->
  <section id="signup">
    <h2>Get Started Today</h2>
    <form id="form" action="https://www.freecodecamp.org/email-submit">
      <input
        id="email"
        type="email"
        name="email"
        placeholder="Enter your email address"
        required
      >
      <input id="submit" type="submit" value="Subscribe">
    </form>
  </section>
  </main>

    <div data-include="components/footer.html"></div>
    <script src="Scripts/htmlinclude.js"></script>

  </body>
  </html>
